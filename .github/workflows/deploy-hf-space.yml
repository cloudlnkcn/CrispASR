name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - 'hf-space/**'
      - '.github/workflows/deploy-hf-space.yml'
  workflow_dispatch:

jobs:
  deploy:
    # Only run in the upstream repo — forks don't deploy to HuggingFace.
    # The guard prevents failures when HF_TOKEN isn't configured in forks,
    # and survives `git merge upstream/main` in sync-upstream.yml.
    if: github.repository == 'CrispStrobe/CrispASR'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push hf-space/ to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-space
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add hf "https://cstr:${HF_TOKEN}@huggingface.co/spaces/cstr/CrispASR"
          git add -A
          git commit -m "deploy from $(git -C .. rev-parse --short HEAD)"
          git push hf main --force
